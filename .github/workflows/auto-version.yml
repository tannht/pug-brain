name: Auto Version

on:
  pull_request:
    types: [closed]
    branches: [pug-master]

permissions:
  contents: write
  id-token: write

jobs:
  # Gate: wait for CI to pass on the merge commit
  ci-check:
    name: Verify CI Status
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.merged == true &&
      !startsWith(github.event.pull_request.title, 'chore: release')
    steps:
      - name: Wait for CI to complete on merge commit
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          running-workflow-name: "Verify CI Status"
          check-name: "Test"
          wait-interval: 15
          allowed-conclusions: success

  auto-version:
    name: Auto Version Bump & Release
    runs-on: ubuntu-latest
    needs: ci-check

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: pug-master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install commitizen
        run: pip install commitizen

      - name: Get current version
        id: current_version
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          text = Path("pyproject.toml").read_text()
          m = re.search(r'^version\s*=\s*"([^"]+)"', text, re.M)
          version = m.group(1) if m else "0.0.0"

          output_path = os.environ.get("GITHUB_OUTPUT")
          with open(output_path, "a", encoding="utf-8") as f:
              f.write(f"version={version}\n")
          print(f"Current version: {version}")
          PY

      - name: Determine version bump
        id: bump
        run: |
          python - <<'PY'
          import os
          import re

          commit_msg = os.environ.get("COMMIT_MSG", "")
          output_path = os.environ.get("GITHUB_OUTPUT")

          # Determine bump type based on commit message
          bump_type = "patch"  # default

          if re.search(r'^BREAKING CHANGE:|^.+!:', commit_msg, re.M):
              bump_type = "major"
          elif re.search(r'^feat(\(.+\))?:', commit_msg, re.M):
              bump_type = "minor"
          elif re.search(r'^fix(\(.+\))?:', commit_msg, re.M):
              bump_type = "patch"
          elif re.search(r'^perf(\(.+\))?:', commit_msg, re.M):
              bump_type = "patch"
          elif re.search(r'^refactor(\(.+\))?:', commit_msg, re.M):
              bump_type = "patch"
          elif re.search(r'^docs(\(.+\))?:', commit_msg, re.M):
              bump_type = "none"  # Don't release for docs
          elif re.search(r'^chore(\(.+\))?:', commit_msg, re.M):
              bump_type = "none"  # Don't release for chore
          elif re.search(r'^test(\(.+\))?:', commit_msg, re.M):
              bump_type = "none"  # Don't release for test
          elif re.search(r'^ci(\(.+\))?:', commit_msg, re.M):
              bump_type = "none"  # Don't release for ci

          with open(output_path, "a", encoding="utf-8") as f:
              f.write(f"bump={bump_type}\n")
          print(f"Bump type: {bump_type}")
          PY
        env:
          COMMIT_MSG: ${{ github.event.pull_request.title }}

      - name: Calculate new version
        id: new_version
        if: steps.bump.outputs.bump != 'none'
        run: |
          python - <<'PY'
          import os
          import re

          current = "${{ steps.current_version.outputs.version }}"
          bump_type = "${{ steps.bump.outputs.bump }}"
          output_path = os.environ.get("GITHUB_OUTPUT")

          major, minor, patch = map(int, current.split('.'))

          if bump_type == "major":
              major += 1
              minor = 0
              patch = 0
          elif bump_type == "minor":
              minor += 1
              patch = 0
          elif bump_type == "patch":
              patch += 1

          new_version = f"{major}.{minor}.{patch}"

          with open(output_path, "a", encoding="utf-8") as f:
              f.write(f"version={new_version}\n")
              f.write(f"tag=v{new_version}\n")
          print(f"New version: {new_version}")
          PY

      - name: Update version files
        if: steps.bump.outputs.bump != 'none'
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"

          # Update pyproject.toml
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" pyproject.toml

          # Update __init__.py
          sed -i "s/__version__ = \".*\"/__version__ = \"$NEW_VERSION\"/" src/neural_memory/__init__.py

          # Update plugin.json
          if [ -f ".claude-plugin/plugin.json" ]; then
            sed -i "s/\"version\": \".*\"/\"version\": \"$NEW_VERSION\"/" .claude-plugin/plugin.json
          fi

          # Update marketplace.json (both occurrences)
          if [ -f ".claude-plugin/marketplace.json" ]; then
            sed -i "s/\"version\": \".*\"/\"version\": \"$NEW_VERSION\"/g" .claude-plugin/marketplace.json
          fi

          # Update test files
          sed -i "s/__version__ == \".*\"/__version__ == \"$NEW_VERSION\"/" tests/unit/test_health_fixes.py
          sed -i "s/\"version\": \".*\"/\"version\": \"$NEW_VERSION\"/" tests/unit/test_markdown_export.py

          echo "Updated all version files to $NEW_VERSION"

      - name: Update CHANGELOG
        if: steps.bump.outputs.bump != 'none'
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          TAG="${{ steps.new_version.outputs.tag }}"
          DATE=$(date +%Y-%m-%d)
          COMMIT_MSG="${{ github.event.pull_request.title }}"

          # Create changelog entry
          TEMP_FILE=$(mktemp)

          echo "## [$TAG] - $DATE" >> $TEMP_FILE
          echo "" >> $TEMP_FILE
          echo "$COMMIT_MSG" >> $TEMP_FILE
          echo "" >> $TEMP_FILE

          if [ -f CHANGELOG.md ]; then
            # Insert after the header
            sed -i "/## \[.*\]/r $TEMP_FILE" CHANGELOG.md
          else
            cat $TEMP_FILE > CHANGELOG.md
          fi

          rm $TEMP_FILE
          echo "Updated CHANGELOG.md"

      - name: Commit version bump
        if: steps.bump.outputs.bump != 'none'
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: release v${NEW_VERSION}"
          git push

      - name: Create GitHub Release
        if: steps.bump.outputs.bump != 'none'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.new_version.outputs.tag }}
          name: PugBrain ${{ steps.new_version.outputs.tag }} 🐶
          body: |
            Automated Release for ${{ steps.new_version.outputs.tag }}

            PR: #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}

            Changes in this version:
            ${{ github.event.pull_request.body }}
          draft: false
          prerelease: false
          generate_release_notes: true
