name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and Publish
    runs-on: ubuntu-latest
    environment: pypi
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Get version
        id: version
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          text = Path("pyproject.toml").read_text()
          m = re.search(r'^version\s*=\s*"([^"]+)"', text, re.M)
          version = m.group(1) if m else "0.0.0"

          output_path = os.environ.get("GITHUB_OUTPUT")
          with open(output_path, "a", encoding="utf-8") as f:
              f.write(f"version={version}\n")
          print(f"Version: {version}")
          PY

      - name: Build dashboard
        run: |
          cd dashboard
          npm install
          npm run build

      - name: Build Python package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: Publish dashboard to npm
        working-directory: dashboard
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --access public || echo "npm publish skipped or failed"

      - name: Build OpenClaw plugin
        working-directory: integrations/openclaw-plugin
        run: |
          npm install
          npm run build

      - name: Publish OpenClaw plugin to npm
        working-directory: integrations/openclaw-plugin
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --access public || echo "OpenClaw plugin npm publish skipped or failed"

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          gh release upload "$TAG" --repo "${{ github.repository }}" --clobber dist/* || true
