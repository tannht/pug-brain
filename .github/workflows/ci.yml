name: CI

on:
  push:
    branches: [main, master, pug-master]
  pull_request:
    branches: [main, master, pug-master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruff mypy
          pip install -e ".[dev,server]"

      - name: Lint
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Type check
        run: mypy src/ --ignore-missing-imports

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev,server]"

      - name: Test
        run: pytest tests/ -v --timeout=60 -n auto -m "not stress"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools
        run: pip install ruff bandit

      - name: Run security rules
        run: ruff check src/ --select S --ignore S101,S110,S112,S311,S324

      - name: Run Bandit
        run: bandit -c pyproject.toml -r src

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm audit (dashboard)
        working-directory: dashboard
        run: |
          npm ci
          npm audit --audit-level=high --omit=dev

      # TODO: Re-enable when openclaw-plugin has package.json tracked in git
